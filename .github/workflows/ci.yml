name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install CLI dependencies
        run: npm ci --prefix packages/cli
      - name: Run lint
        run: npm run lint --prefix packages/cli

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install CLI dependencies
        run: npm ci --prefix packages/cli
      - name: Run tests
        run: npm test --prefix packages/cli