upstream worker_nodes {
    # Round-robin across all worker VPS nodes
    # Replace these with actual VPS IPs/hostnames
    server vps-1:3100;
    server vps-2:3100;
    server vps-3:3100;
}

server {
    listen 80;
    server_name workers.getwired.app;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name workers.getwired.app;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/workers.getwired.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/workers.getwired.app/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Timeouts matching Convex action limits
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 180s;  # 3 min for competitor discovery

    # Request size limit
    client_max_body_size 1M;

    location /api/ {
        proxy_pass http://worker_nodes;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Health check failover
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # Health check endpoint (no auth required)
    location = /api/v1/health {
        proxy_pass http://worker_nodes;
        proxy_set_header Host $host;
    }
}

