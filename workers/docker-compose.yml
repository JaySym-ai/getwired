version: "3.8"

services:
  worker:
    build: .
    ports:
      - "${PORT:-3100}:3100"
    environment:
      - WORKER_API_KEY=${WORKER_API_KEY}
      - NODE_ID=${NODE_ID:-vps-1}
      - PORT=3100
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

